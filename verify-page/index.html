<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATLAST Protocol — Verify Evidence</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --text: #e5e5e5;
      --muted: #888;
      --accent: #3b82f6;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
    
    /* Header */
    .header { text-align: center; margin-bottom: 3rem; }
    .header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .header h1 span { color: var(--accent); }
    .header p { color: var(--muted); font-size: 0.9rem; }
    
    /* Search */
    .search-box {
      display: flex; gap: 0.5rem; margin-bottom: 2rem;
    }
    .search-box input {
      flex: 1; padding: 0.75rem 1rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 1rem; font-family: monospace;
    }
    .search-box input::placeholder { color: var(--muted); }
    .search-box input:focus { outline: none; border-color: var(--accent); }
    .search-box button {
      padding: 0.75rem 1.5rem; background: var(--accent);
      border: none; border-radius: 8px; color: white;
      font-size: 1rem; cursor: pointer; font-weight: 600;
    }
    .search-box button:hover { opacity: 0.9; }
    .search-box button:disabled { opacity: 0.5; cursor: wait; }
    
    /* Results */
    .result { display: none; }
    .result.active { display: block; }
    
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem;
    }
    .card h3 { font-size: 1rem; color: var(--muted); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
    
    .status {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1rem; border-radius: 20px; font-weight: 600; font-size: 0.9rem;
    }
    .status.verified { background: rgba(34, 197, 94, 0.15); color: var(--green); }
    .status.pending { background: rgba(234, 179, 8, 0.15); color: var(--yellow); }
    .status.failed { background: rgba(239, 68, 68, 0.15); color: var(--red); }
    
    .field { margin-bottom: 0.75rem; }
    .field-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .field-value {
      font-family: monospace; font-size: 0.85rem; word-break: break-all;
      padding: 0.5rem; background: var(--bg); border-radius: 4px; margin-top: 0.25rem;
    }
    .field-value a { color: var(--accent); text-decoration: none; }
    .field-value a:hover { text-decoration: underline; }
    
    /* Merkle Tree Viz */
    .merkle-tree { text-align: center; padding: 1rem 0; }
    .merkle-node {
      display: inline-block; padding: 0.25rem 0.5rem;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; font-family: monospace; font-size: 0.7rem;
      margin: 0.25rem;
    }
    .merkle-node.root { border-color: var(--accent); color: var(--accent); }
    .merkle-node.leaf { border-color: var(--green); color: var(--green); }
    
    /* Error */
    .error { color: var(--red); padding: 1rem; text-align: center; }
    
    /* Loading */
    .loading { text-align: center; padding: 2rem; color: var(--muted); }
    
    /* Footer */
    .footer {
      text-align: center; padding: 2rem 0; color: var(--muted);
      font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 3rem;
    }
    .footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⛓️ <span>ATLAST</span> Protocol — Verify</h1>
      <p>Independently verify any ECP evidence chain or batch attestation</p>
    </div>
    
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Enter batch_id, attestation_uid, or record hash..." 
             onkeydown="if(event.key==='Enter')verify()">
      <button id="verifyBtn" onclick="verify()">Verify</button>
    </div>
    
    <div id="loading" class="loading" style="display:none">🔍 Verifying...</div>
    <div id="error" class="error" style="display:none"></div>
    
    <!-- Batch Result -->
    <div id="batchResult" class="result">
      <div class="card">
        <h3>Batch Status</h3>
        <div id="batchStatus"></div>
      </div>
      <div class="card">
        <h3>Batch Details</h3>
        <div id="batchDetails"></div>
      </div>
      <div class="card" id="chainCard" style="display:none">
        <h3>On-Chain Attestation</h3>
        <div id="chainDetails"></div>
      </div>
    </div>
    
    <!-- Merkle Verify Result -->
    <div id="merkleResult" class="result">
      <div class="card">
        <h3>Merkle Verification</h3>
        <div id="merkleDetails"></div>
      </div>
    </div>
    
    <div class="footer">
      <p>
        Powered by <a href="https://github.com/willau95/atlast-ecp">ATLAST Protocol</a> — 
        Evidence Chain Protocol for the Agent Economy<br>
        Server: <a href="https://api.weba0.com/health">api.weba0.com</a> |
        <a href="https://github.com/willau95/atlast-ecp/blob/main/ECP-SPEC.md">ECP Spec</a>
      </p>
    </div>
  </div>

  <script>
    const API = 'https://api.weba0.com';
    
    // Parse URL params on load
    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id') || params.get('batch') || params.get('uid');
      if (id) {
        document.getElementById('searchInput').value = id;
        verify();
      }
    });
    
    async function verify() {
      const input = document.getElementById('searchInput').value.trim();
      if (!input) return;
      
      const btn = document.getElementById('verifyBtn');
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      
      // Reset
      btn.disabled = true;
      loading.style.display = 'block';
      error.style.display = 'none';
      document.querySelectorAll('.result').forEach(r => r.classList.remove('active'));
      
      // Update URL for sharing
      const url = new URL(window.location);
      url.searchParams.set('id', input);
      history.replaceState({}, '', url);
      
      try {
        if (input.startsWith('batch_')) {
          await verifyBatch(input);
        } else if (input.startsWith('0x')) {
          await verifyAttestation(input);
        } else {
          // Try batch first, then attestation
          try {
            await verifyBatch(input);
          } catch {
            await verifyAttestation(input);
          }
        }
      } catch (e) {
        error.textContent = `❌ ${e.message}`;
        error.style.display = 'block';
      } finally {
        btn.disabled = false;
        loading.style.display = 'none';
      }
    }
    
    async function verifyBatch(batchId) {
      const resp = await fetch(`${API}/v1/batches/${batchId}`);
      if (!resp.ok) {
        if (resp.status === 404) throw new Error(`Batch "${batchId}" not found`);
        if (resp.status === 503) throw new Error('Database not available');
        throw new Error(`Server error: ${resp.status}`);
      }
      
      const data = await resp.json();
      
      // Status badge
      const statusEl = document.getElementById('batchStatus');
      const statusClass = data.status === 'anchored' ? 'verified' : 
                         data.status === 'pending' ? 'pending' : 'failed';
      const statusIcon = data.status === 'anchored' ? '✅' : 
                        data.status === 'pending' ? '⏳' : '❌';
      statusEl.innerHTML = `<span class="status ${statusClass}">${statusIcon} ${data.status.toUpperCase()}</span>`;
      
      // Details
      const details = document.getElementById('batchDetails');
      details.innerHTML = `
        ${field('Batch ID', data.batch_id)}
        ${field('Agent DID', data.agent_did)}
        ${field('Merkle Root', data.merkle_root)}
        ${field('Records', data.record_count)}
        ${field('Created', data.created_at ? new Date(data.created_at).toLocaleString() : 'N/A')}
      `;
      
      // Chain details
      if (data.attestation_uid || data.eas_tx_hash) {
        const chainEl = document.getElementById('chainDetails');
        let html = '';
        if (data.attestation_uid) {
          html += field('Attestation UID', `<a href="https://base.easscan.org/attestation/view/${data.attestation_uid}" target="_blank">${data.attestation_uid}</a>`);
        }
        if (data.eas_tx_hash) {
          html += field('Transaction', `<a href="https://basescan.org/tx/${data.eas_tx_hash}" target="_blank">${data.eas_tx_hash}</a>`);
        }
        chainEl.innerHTML = html;
        document.getElementById('chainCard').style.display = 'block';
      } else {
        document.getElementById('chainCard').style.display = 'none';
      }
      
      document.getElementById('batchResult').classList.add('active');
    }
    
    async function verifyAttestation(uid) {
      const resp = await fetch(`${API}/v1/verify/${uid}`);
      if (!resp.ok) {
        if (resp.status === 404) throw new Error(`Attestation "${uid}" not found`);
        throw new Error(`Server error: ${resp.status}`);
      }
      
      const data = await resp.json();
      const details = document.getElementById('merkleDetails');
      
      const statusClass = data.valid ? 'verified' : 'failed';
      const statusIcon = data.valid ? '✅' : '❌';
      
      details.innerHTML = `
        <span class="status ${statusClass}">${statusIcon} ${data.valid ? 'VERIFIED' : 'INVALID'}</span>
        <div style="margin-top: 1rem">
          ${field('Attestation UID', data.attestation_uid || uid)}
          ${field('Merkle Root', data.merkle_root || 'N/A')}
          ${field('Agent DID', data.agent_did || 'N/A')}
          ${field('On-Chain', data.on_chain ? 'Yes ✅' : 'No')}
          ${data.chain_id ? field('Chain', `Base (${data.chain_id})`) : ''}
        </div>
      `;
      
      document.getElementById('merkleResult').classList.add('active');
    }
    
    function field(label, value) {
      return `<div class="field">
        <div class="field-label">${label}</div>
        <div class="field-value">${value}</div>
      </div>`;
    }
  </script>
</body>
</html>
