<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/><line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/><line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>
  <!-- Logo icon -->
  <g transform="translate(380, 90)">
    <path d="M40 10 L10 25 L40 40 L70 25 Z" fill="url(#accent)" opacity="0.9"/>
    <path d="M10 25 L10 55 L40 70 L40 40 Z" fill="#3b82f6" opacity="0.7"/>
    <path d="M70 25 L70 55 L40 70 L40 40 Z" fill="#8b5cf6" opacity="0.7"/>
    <path d="M40 50 L10 65 L40 80 L70 65 Z" fill="url(#accent)" opacity="0.5"/>
  </g>
  <!-- Text -->
  <text x="470" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#ffffff" letter-spacing="-1">ATLAST</text>
  <text x="470" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#9ca3af" letter-spacing="4">PROTOCOL</text>
  <text x="470" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#6b7280">Evidence Chain Protocol — Verifiable trust for the Agent economy</text>
  <!-- Badges -->
  <g transform="translate(470, 230)">
    <rect width="70" height="24" rx="12" fill="#3b82f6" opacity="0.15"/>
    <text x="35" y="16" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle" font-weight="600">ECP</text>
    <rect x="80" width="55" height="24" rx="12" fill="#22c55e" opacity="0.15"/>
    <text x="107" y="16" font-family="system-ui, sans-serif" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="600">Live</text>
    <rect x="145" width="90" height="24" rx="12" fill="#a855f7" opacity="0.15"/>
    <text x="190" y="16" font-family="system-ui, sans-serif" font-size="11" fill="#a855f7" text-anchor="middle" font-weight="600">Base L2</text>
  </g>
</svg>
