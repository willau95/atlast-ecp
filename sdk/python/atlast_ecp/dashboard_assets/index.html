<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAST ECP — Agent Evidence Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
  --border: #30363d; --text: #e6edf3; --text2: #8b949e;
  --accent: #58a6ff; --green: #3fb950; --yellow: #d29922;
  --red: #f85149; --orange: #db6d28;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Layout */
.header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 18px; font-weight: 600; }
.header .subtitle { color: var(--text2); font-size: 13px; }
.header .pill { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 2px 10px; font-size: 12px; color: var(--text2); margin-left: auto; }
.main { max-width: 1100px; margin: 0 auto; padding: 24px; }

/* Nav tabs */
.nav { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
.nav button { background: none; border: none; color: var(--text2); padding: 10px 16px; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.nav button:hover { color: var(--text); }
.nav button.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Cards */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.card h2 { font-size: 16px; margin-bottom: 12px; }
.card h3 { font-size: 14px; margin-bottom: 8px; color: var(--text2); }

/* Stats row */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; text-align: center; }
.stat-card .value { font-size: 28px; font-weight: 700; }
.stat-card .label { font-size: 12px; color: var(--text2); margin-top: 4px; }

/* Problems list */
.problem { border-left: 3px solid var(--red); padding: 12px 16px; margin-bottom: 10px; background: rgba(248,81,73,0.05); border-radius: 0 6px 6px 0; cursor: pointer; transition: background 0.15s; }
.problem:hover { background: rgba(248,81,73,0.1); }
.problem.warning { border-left-color: var(--yellow); background: rgba(210,153,34,0.05); }
.problem.warning:hover { background: rgba(210,153,34,0.1); }
.problem .severity { font-size: 12px; font-weight: 600; text-transform: uppercase; }
.problem .severity.high { color: var(--red); }
.problem .severity.medium { color: var(--yellow); }
.problem .title { font-weight: 600; margin: 4px 0; }
.problem .detail { font-size: 13px; color: var(--text2); }
.problem .trace-link { font-size: 12px; color: var(--accent); margin-top: 6px; display: inline-block; }

/* No problems */
.all-good { text-align: center; padding: 40px; color: var(--green); }
.all-good .icon { font-size: 48px; margin-bottom: 12px; }
.all-good .msg { font-size: 16px; }

/* Record list */
.record { border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: background 0.15s; }
.record:hover { background: var(--bg3); }
.record .top-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.record .agent-badge { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 1px 8px; font-size: 11px; color: var(--accent); font-family: monospace; }
.record .action-badge { font-weight: 600; font-size: 13px; }
.record .model-badge { color: var(--text2); font-size: 12px; }
.record .time { color: var(--text2); font-size: 12px; margin-left: auto; }
.record .metrics { display: flex; gap: 16px; margin-top: 6px; font-size: 12px; color: var(--text2); }
.record .error-flag { color: var(--red); font-weight: 600; }
.record .low-conf { color: var(--yellow); }
.record .vault-preview { margin-top: 8px; padding: 10px; background: var(--bg); border-radius: 4px; font-size: 13px; display: none; }
.record .vault-preview.open { display: block; }
.record .vault-preview .vault-label { font-size: 11px; color: var(--text2); text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
.record .vault-preview .vault-content { white-space: pre-wrap; word-break: break-word; font-family: monospace; font-size: 12px; line-height: 1.6; }

/* Search */
.search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
.search-bar input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; }
.search-bar input:focus { border-color: var(--accent); }
.search-bar button { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 10px 20px; font-size: 14px; cursor: pointer; }
.search-bar button:hover { opacity: 0.9; }
.search-bar select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; color: var(--text); font-size: 13px; }

/* Timeline chart */
.timeline-chart { margin: 16px 0; }
.timeline-row { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; font-size: 12px; }
.timeline-row .date { width: 80px; color: var(--text2); text-align: right; font-family: monospace; }
.timeline-row .bar-container { flex: 1; height: 20px; display: flex; gap: 1px; }
.timeline-row .bar { height: 100%; border-radius: 2px; min-width: 1px; }
.timeline-row .bar.ok { background: var(--green); opacity: 0.7; }
.timeline-row .bar.error { background: var(--red); }
.timeline-row .count { width: 50px; font-family: monospace; color: var(--text2); text-align: right; }
.timeline-legend { display: flex; gap: 16px; font-size: 12px; color: var(--text2); margin-top: 8px; }
.timeline-legend span::before { content: ''; display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
.timeline-legend .ok-legend::before { background: var(--green); opacity: 0.7; }
.timeline-legend .err-legend::before { background: var(--red); }

/* Trace chain */
.chain-step { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 0; position: relative; }
.chain-line { position: absolute; left: 15px; top: 32px; bottom: -8px; width: 2px; background: var(--border); }
.chain-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); margin-top: 4px; flex-shrink: 0; border: 2px solid var(--bg2); position: relative; z-index: 1; }
.chain-dot.error { background: var(--red); }
.chain-step-content { flex: 1; padding-bottom: 16px; }
.chain-step-content .step-header { display: flex; gap: 8px; align-items: center; font-size: 13px; }
.chain-step-content .step-id { font-family: monospace; font-size: 11px; color: var(--text2); }
.chain-step-content .step-body { margin-top: 6px; padding: 10px; background: var(--bg); border-radius: 4px; font-size: 12px; font-family: monospace; white-space: pre-wrap; line-height: 1.6; }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text2); }

/* Responsive */
@media (max-width: 600px) {
  .main { padding: 12px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .record .top-row { font-size: 12px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>📊 ATLAST ECP</h1>
  <span class="subtitle">Agent Evidence Dashboard — all data local</span>
  <span class="pill" id="header-stats">loading...</span>
</div>

<div class="main">
  <div class="nav">
    <button class="active" onclick="showTab('overview')">🏠 Overview</button>
    <button onclick="showTab('activity')">📋 Activity</button>
    <button onclick="showTab('search')">🔍 Search</button>
    <button onclick="showTab('trace')">🔗 Trace</button>
  </div>

  <!-- Overview Tab -->
  <div id="tab-overview" class="tab">
    <div class="stats-row" id="stats-row"></div>
    <div class="card" id="problems-card">
      <h2>🔍 Detected Issues</h2>
      <div id="problems-list"><div class="loading">Analyzing records...</div></div>
    </div>
    <div class="card">
      <h2>📅 Activity Timeline (last 30 days)</h2>
      <div id="overview-timeline"><div class="loading">Loading...</div></div>
    </div>
  </div>

  <!-- Activity Tab -->
  <div id="tab-activity" class="tab" style="display:none">
    <div class="search-bar">
      <select id="activity-agent" onchange="loadActivity()">
        <option value="">All agents</option>
      </select>
      <select id="activity-filter" onchange="loadActivity()">
        <option value="">All records</option>
        <option value="errors">Errors only</option>
      </select>
      <button onclick="loadActivity()">Refresh</button>
    </div>
    <div id="activity-list"><div class="loading">Loading...</div></div>
  </div>

  <!-- Search Tab -->
  <div id="tab-search" class="tab" style="display:none">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search records... (e.g., 'SQL injection', 'error', 'NVIDIA')" onkeyup="if(event.key==='Enter')doSearch()">
      <button onclick="doSearch()">Search</button>
    </div>
    <div id="search-results"></div>
  </div>

  <!-- Trace Tab -->
  <div id="tab-trace" class="tab" style="display:none">
    <div class="search-bar">
      <input type="text" id="trace-input" placeholder="Enter record ID (e.g., rec_abc123...)" onkeyup="if(event.key==='Enter')doTrace()">
      <select id="trace-dir">
        <option value="back">⬅ Trace backwards (root cause)</option>
        <option value="forward">➡ Trace forward (impact)</option>
      </select>
      <button onclick="doTrace()">Trace</button>
    </div>
    <div id="trace-results"></div>
  </div>
</div>

<script>
const API = '';

// ── Tab switching ──
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).style.display = 'block';
  document.querySelector(`.nav button[onclick="showTab('${name}')"]`).classList.add('active');
  
  if (name === 'activity' && !activityLoaded) loadActivity();
}

// ── API helpers ──
async function api(path) {
  const res = await fetch(API + path);
  return res.json();
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtTime(ts) {
  if (!ts) return '?';
  const d = new Date(ts);
  return d.toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function shortAgent(agent) {
  if (!agent) return '?';
  return agent.replace('did:ecp:', '');
}

// ── Overview ──
async function loadOverview() {
  // Stats
  const stats = await api('/api/stats');
  document.getElementById('header-stats').textContent = `${stats.total_records} records · local only`;

  // Audit (for problems)
  const audit = await api('/api/audit?days=60');
  renderStats(audit);
  renderProblems(audit);

  // Timeline
  const tl = await api('/api/timeline?days=30');
  renderTimeline(tl.timeline, 'overview-timeline');

  // Populate agent dropdown
  populateAgents();
}

function renderStats(audit) {
  const s = audit.summary || {};
  const html = [
    { value: s.total_records || 0, label: 'Total Records' },
    { value: s.total_errors || 0, label: 'Errors', cls: s.total_errors > 0 ? 'color:var(--red)' : '' },
    { value: (s.error_rate_pct || 0) + '%', label: 'Error Rate', cls: s.error_rate_pct > 10 ? 'color:var(--red)' : s.error_rate_pct > 5 ? 'color:var(--yellow)' : 'color:var(--green)' },
    { value: (s.avg_latency_ms || 0) + 'ms', label: 'Avg Latency' },
    { value: s.sessions || 0, label: 'Sessions' },
    { value: s.active_days || 0, label: 'Active Days' },
  ].map(x => `<div class="stat-card"><div class="value" style="${x.cls||''}">${x.value}</div><div class="label">${x.label}</div></div>`).join('');
  document.getElementById('stats-row').innerHTML = html;
}

function renderProblems(audit) {
  const el = document.getElementById('problems-list');
  const anomalies = audit.anomalies || [];
  const rootCauses = audit.root_causes || [];

  if (anomalies.length === 0) {
    el.innerHTML = `<div class="all-good"><div class="icon">✅</div><div class="msg">No issues detected in the last ${audit.period?.days || 30} days</div></div>`;
    return;
  }

  // Build root cause lookup
  const rcMap = {};
  rootCauses.forEach(rc => { rcMap[rc.date + ':' + rc.anomaly] = rc; });

  let html = '';
  anomalies.forEach(a => {
    const isHigh = a.severity === 'high';
    const cls = isHigh ? '' : ' warning';
    const sevCls = isHigh ? 'high' : 'medium';
    const rc = rcMap[a.date + ':' + a.type];

    let typeLabel = {
      'error_spike': '🔴 Error Spike',
      'confidence_drop': '🟡 Confidence Drop',
      'latency_spike': '🟠 Latency Spike',
    }[a.type] || a.type;

    let explanation = '';
    if (a.type === 'error_spike') {
      explanation = 'Multiple operations failed on this day. Click to see the first error and trace its root cause.';
    } else if (a.type === 'confidence_drop') {
      explanation = `Agent confidence suddenly dropped. This could mean: model change, degraded data quality, or prompt issues.`;
    } else if (a.type === 'latency_spike') {
      explanation = 'Response times were 3x+ slower than normal. Possible causes: model overload, large inputs, or network issues.';
    }

    let traceHtml = '';
    if (rc && rc.trace_start) {
      traceHtml = `<div class="trace-link" onclick="event.stopPropagation(); jumpToTrace('${rc.trace_start}')">🔗 Trace root cause from ${rc.trace_start.substring(0,20)}...</div>`;
    } else if (a.first_error_id) {
      traceHtml = `<div class="trace-link" onclick="event.stopPropagation(); jumpToTrace('${a.first_error_id}')">🔗 Trace from first error</div>`;
    }

    html += `
      <div class="problem${cls}" onclick="jumpToSearch('${a.date}')">
        <div class="severity ${sevCls}">${typeLabel} · ${a.date}</div>
        <div class="title">${escHtml(a.detail)}</div>
        <div class="detail">${explanation}</div>
        ${traceHtml}
      </div>`;
  });

  el.innerHTML = html;
}

function renderTimeline(data, targetId) {
  const el = document.getElementById(targetId);
  if (!data || data.length === 0) {
    el.innerHTML = '<div class="loading">No activity data</div>';
    return;
  }

  const maxTotal = Math.max(...data.map(d => d.total));

  let html = '<div class="timeline-chart">';
  data.forEach(d => {
    const okCount = d.total - d.errors;
    const okWidth = Math.max(1, (okCount / maxTotal) * 100);
    const errWidth = Math.max(0, (d.errors / maxTotal) * 100);
    const errIndicator = d.error_rate > 15 ? ' ⚠️' : '';

    html += `
      <div class="timeline-row">
        <span class="date">${d.date.substring(5)}</span>
        <div class="bar-container">
          <div class="bar ok" style="width:${okWidth}%" title="${okCount} successful"></div>
          ${d.errors > 0 ? `<div class="bar error" style="width:${errWidth}%" title="${d.errors} errors"></div>` : ''}
        </div>
        <span class="count">${d.total}${errIndicator}</span>
      </div>`;
  });
  html += '</div>';
  html += `<div class="timeline-legend"><span class="ok-legend">Successful</span><span class="err-legend">Errors</span></div>`;
  el.innerHTML = html;
}

// ── Activity ──
let activityLoaded = false;
async function loadActivity() {
  activityLoaded = true;
  const agent = document.getElementById('activity-agent').value;
  const errorsOnly = document.getElementById('activity-filter').value === 'errors';
  let url = `/api/search?limit=50`;
  if (agent) url += `&agent=${encodeURIComponent(agent)}`;
  if (errorsOnly) url += `&errors=1`;
  const data = await api(url);
  renderRecords(data.results || [], 'activity-list');
}

function renderRecords(records, targetId) {
  const el = document.getElementById(targetId);
  if (!records.length) {
    el.innerHTML = '<div class="loading">No records found</div>';
    return;
  }

  el.innerHTML = records.map(r => {
    const isError = r.error || (r.flags && r.flags.includes('error'));
    const conf = r.confidence != null ? r.confidence.toFixed(2) : '-';
    const confCls = r.confidence != null && r.confidence < 0.6 ? 'low-conf' : '';

    const inputPrev = escHtml((r.input_preview || '').substring(0, 120));
    const outputPrev = escHtml((r.output_preview || '').substring(0, 300));

    return `
      <div class="record" onclick="toggleVault(this)" data-id="${r.id}">
        <div class="top-row">
          <span class="agent-badge">${shortAgent(r.agent)}</span>
          <span class="action-badge">${isError ? '❌' : '✅'} ${escHtml(r.action || r.step_type)}</span>
          <span class="model-badge">${escHtml(r.model)}</span>
          <span class="time">${fmtTime(r.ts)}</span>
        </div>
        <div class="metrics">
          <span>${r.latency_ms || 0}ms</span>
          <span class="${confCls}">confidence: ${conf}</span>
          ${isError ? '<span class="error-flag">ERROR</span>' : ''}
          <span style="margin-left:auto; font-family:monospace; font-size:11px; color:var(--text2)">${(r.id||'').substring(0,20)}</span>
        </div>
        <div class="vault-preview">
          ${inputPrev ? `<div class="vault-label">📥 Input</div><div class="vault-content">${inputPrev}${r.input_preview && r.input_preview.length > 120 ? '...' : ''}</div>` : ''}
          ${outputPrev ? `<div class="vault-label" style="margin-top:8px">📤 Output</div><div class="vault-content">${outputPrev}${r.output_preview && r.output_preview.length > 300 ? '...' : ''}</div>` : ''}
          ${r.id ? `<div style="margin-top:8px"><a href="#" onclick="event.preventDefault(); event.stopPropagation(); jumpToTrace('${r.id}')">🔗 Trace evidence chain</a></div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function toggleVault(el) {
  const vault = el.querySelector('.vault-preview');
  vault.classList.toggle('open');
}

// ── Search ──
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  document.getElementById('search-results').innerHTML = '<div class="loading">Searching...</div>';
  const data = await api(`/api/search?q=${encodeURIComponent(q)}&limit=30`);
  const el = document.getElementById('search-results');
  if (data.count === 0) {
    el.innerHTML = `<div class="loading">No results for "${escHtml(q)}"</div>`;
    return;
  }
  el.innerHTML = `<div style="margin-bottom:12px; color:var(--text2); font-size:13px">${data.count} results for "${escHtml(q)}"</div>`;
  const container = document.createElement('div');
  el.appendChild(container);
  renderRecords(data.results, container.id || (container.id = 'search-results-inner'));
}

// ── Trace ──
async function doTrace() {
  const id = document.getElementById('trace-input').value.trim();
  if (!id) return;
  const dir = document.getElementById('trace-dir').value;
  document.getElementById('trace-results').innerHTML = '<div class="loading">Tracing chain...</div>';
  const data = await api(`/api/trace?id=${encodeURIComponent(id)}&dir=${dir}`);
  renderChain(data.chain || [], id, dir);
}

function renderChain(chain, startId, direction) {
  const el = document.getElementById('trace-results');
  if (!chain.length) {
    el.innerHTML = `<div class="loading">No chain found from ${escHtml(startId)}</div>`;
    return;
  }

  const label = direction === 'back' ? '⬅ Root Cause Trace' : '➡ Impact Trace';
  let html = `<div class="card"><h2>${label} — ${chain.length} steps</h2><div style="margin-top:16px">`;

  chain.forEach((entry, i) => {
    const r = entry.record || entry;
    const rid = r.id || entry.id || '?';
    const action = r.action || (r.step && r.step.action) || entry.action || '';
    const stepType = r.step_type || (r.step && r.step.type) || entry.step_type || '';
    const isError = entry.error || (r.flags && typeof r.flags === 'string' && r.flags.includes('error'));
    const dotCls = isError ? ' error' : '';
    const conf = entry.confidence != null ? entry.confidence.toFixed(2) : (r.confidence != null ? r.confidence.toFixed(2) : '-');
    const latency = entry.latency_ms || r.latency_ms || 0;
    const model = entry.model || r.model || '';

    const inputPrev = escHtml((entry.input_preview || '').substring(0, 200));
    const outputPrev = escHtml((entry.output_preview || '').substring(0, 400));
    const isLast = i === chain.length - 1;

    html += `
      <div class="chain-step">
        ${!isLast ? '<div class="chain-line"></div>' : ''}
        <div class="chain-dot${dotCls}"></div>
        <div class="chain-step-content">
          <div class="step-header">
            <strong>${isError ? '❌' : '✅'} ${escHtml(stepType)}:${escHtml(action)}</strong>
            <span style="color:var(--text2)">${escHtml(model)}</span>
            <span style="color:var(--text2)">${latency}ms</span>
            <span style="color:${conf < 0.6 ? 'var(--yellow)' : 'var(--text2)'}">conf:${conf}</span>
            <span class="step-id">${fmtTime(entry.ts || r.ts)}</span>
          </div>
          <div class="step-id">${rid}</div>
          ${inputPrev || outputPrev ? `
          <div class="step-body">${inputPrev ? `📥 ${inputPrev}\n\n` : ''}${outputPrev ? `📤 ${outputPrev}` : ''}</div>
          ` : ''}
        </div>
      </div>`;
  });

  html += '</div></div>';
  el.innerHTML = html;
}

// ── Navigation helpers ──
function jumpToTrace(recordId) {
  showTab('trace');
  document.getElementById('trace-input').value = recordId;
  doTrace();
}

function jumpToSearch(date) {
  showTab('search');
  document.getElementById('search-input').value = date;
  doSearch();
}

// ── Agent list ──
async function populateAgents() {
  // Get unique agents from recent search
  const data = await api('/api/search?limit=200');
  const agents = [...new Set((data.results || []).map(r => r.agent).filter(Boolean))];
  const sel = document.getElementById('activity-agent');
  agents.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a;
    opt.textContent = shortAgent(a);
    sel.appendChild(opt);
  });
}

// ── Init ──
loadOverview();
</script>
</body>
</html>
