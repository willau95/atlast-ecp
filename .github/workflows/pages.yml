name: Deploy Docs + Verify + Dashboard + Onboarding to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - 'verify-page/**'
      - 'verify/**'
      - 'dashboard/**'
      - 'onboarding/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build docs
        run: |
          cd docs-site
          npm ci
          npx vitepress build
      - name: Prepare pages
        run: |
          mkdir -p _site
          cp -r docs-site/.vitepress/dist/* _site/
          mkdir -p _site/verify
          # verify-page (legacy) or verify/ folder
          cp verify-page/index.html _site/verify/ 2>/dev/null || true
          cp verify/index.html _site/verify/ 2>/dev/null || true
          # Dashboard
          mkdir -p _site/dashboard
          cp dashboard/* _site/dashboard/
          # Onboarding
          mkdir -p _site/onboarding
          cp onboarding/* _site/onboarding/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
