<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATLAST Protocol — Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
      <div class="login-box">
        <div class="login-logo">◈ ATLAST</div>
        <h1>Protocol Dashboard</h1>
        <p class="login-sub">Enter your API key to continue</p>
        <input type="text" id="api-key-input" placeholder="ak_live_..." autocomplete="off" spellcheck="false">
        <button id="login-btn" onclick="doLogin()">Connect</button>
        <p id="login-error" class="error" hidden></p>
        <p class="login-hint">Don't have a key? <a href="../onboarding/" target="_blank">Get started →</a></p>
      </div>
    </div>

    <!-- Main Dashboard -->
    <div id="main" class="main" hidden>
      <!-- Sidebar -->
      <nav class="sidebar">
        <div class="sidebar-logo" onclick="navigate('overview')">◈ ATLAST</div>
        <a class="nav-item active" data-page="overview" onclick="navigate('overview')">
          <span class="nav-icon">⊞</span> Overview
        </a>
        <a class="nav-item" data-page="records" onclick="navigate('records')">
          <span class="nav-icon">◎</span> Records
        </a>
        <a class="nav-item" data-page="batches" onclick="navigate('batches')">
          <span class="nav-icon">⧉</span> Batches
        </a>
        <a class="nav-item" data-page="chain" onclick="navigate('chain')">
          <span class="nav-icon">⟠</span> Chain
        </a>
        <a class="nav-item" data-page="settings" onclick="navigate('settings')">
          <span class="nav-icon">⚙</span> Settings
        </a>
        <div class="sidebar-footer">
          <button class="logout-btn" onclick="doLogout()">Logout</button>
        </div>
      </nav>

      <!-- Content -->
      <div class="content">
        <div id="page-overview" class="page"></div>
        <div id="page-records" class="page" hidden></div>
        <div id="page-batches" class="page" hidden></div>
        <div id="page-chain" class="page" hidden></div>
        <div id="page-settings" class="page" hidden></div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
