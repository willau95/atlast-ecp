version: "3.8"

services:
  ecp-server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    ports:
      - "8900:8900"
    volumes:
      - ecp-data:/app/data
    environment:
      - ECP_DB_PATH=/app/data/ecp_server.db
      - ECP_PORT=8900
      - ECP_LOG_LEVEL=info

volumes:
  ecp-data:
